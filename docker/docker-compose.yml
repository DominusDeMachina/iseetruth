services:
  app:
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    env_file: ../.env
    volumes:
      - ../storage:/app/storage
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - osint-network

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - osint-network

  postgres:
    image: postgres:17-alpine
    env_file: ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osint}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - osint-network

  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/osint_dev}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p osint_dev 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - neo4j-data:/data
    networks:
      - osint-network

  qdrant:
    image: qdrant/qdrant:v1.17.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - osint-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - osint-network

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - osint-network

volumes:
  postgres-data:
  neo4j-data:
  qdrant-data:
  redis-data:
  ollama-models:

networks:
  osint-network:
    driver: bridge
