services:
  postgres:
    image: postgres:17-alpine
    env_file: ../.env
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osint}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - osint-network

  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/osint_dev}
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p osint_dev 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - neo4j-data:/data
    networks:
      - osint-network

  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "6333:6333"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - osint-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - osint-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - osint-network

  ollama-embedding:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    restart: unless-stopped
    volumes:
      - ollama-embedding-models:/root/.ollama
    networks:
      - osint-network

  web:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "corepack enable pnpm && pnpm install && pnpm --filter web dev --host 0.0.0.0"]
    ports:
      - "5173:5173"
    volumes:
      - ../package.json:/app/package.json
      - ../pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ../pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ../apps/web:/app/apps/web
      - web-node-modules:/app/node_modules
      - web-app-node-modules:/app/apps/web/node_modules
    environment:
      - API_PROXY_TARGET=http://api:8000
    restart: unless-stopped
    networks:
      - osint-network

  api:
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    env_file: ../.env
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api:/app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      ollama-embedding:
        condition: service_started
    networks:
      - osint-network

  worker:
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    env_file: ../.env
    command: ["uv", "run", "celery", "-A", "app.worker.celery_app", "worker", "--loglevel=debug"]
    volumes:
      - ../apps/api:/app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      ollama-embedding:
        condition: service_started
    networks:
      - osint-network

volumes:
  postgres-data:
  neo4j-data:
  qdrant-data:
  redis-data:
  ollama-models:
  ollama-embedding-models:
  web-node-modules:
  web-app-node-modules:

networks:
  osint-network:
    driver: bridge
